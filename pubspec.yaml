name: gempara_app
description: SmartLock IoT App with EMQX Broker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Library utama untuk koneksi MQTT ke EMQX
  mqtt_client: ^10.2.0
  # Library pendukung untuk pemrosesan data biner MQTT
  typed_data: ^1.3.2
  # Icon standar untuk UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Untuk menjaga kualitas kodingan Anda
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
