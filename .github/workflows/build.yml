name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # Buat project flutter lengkap
      - run: flutter create temp_app

      # Hapus main bawaan
      - run: rm temp_app/lib/main.dart

      # Salin kode kamu ke project flutter
      - run: cp -r lib/* temp_app/lib/

      - run: cd temp_app && flutter pub get
      - run: cd temp_app && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
